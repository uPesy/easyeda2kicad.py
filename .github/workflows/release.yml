name: Bump version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.API_GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Bump version
        id: bump
        run: |
          OLD=$(python -c "
          import re
          m = re.search(r'^__version__ = \"([^\"]+)\"', open('easyeda2kicad/_version.py').read(), re.MULTILINE)
          if not m:
              raise SystemExit('Could not find __version__ in _version.py')
          print(m.group(1))
          ")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$OLD"
          BUMP="${{ inputs.bump }}"
          if [ "$BUMP" = "major" ]; then MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0
          elif [ "$BUMP" = "minor" ]; then MINOR=$((MINOR+1)); PATCH=0
          else PATCH=$((PATCH+1))
          fi
          NEW="$MAJOR.$MINOR.$PATCH"

          python -c "
          import re, sys
          path = 'easyeda2kicad/_version.py'
          src = open(path).read()
          new_src, n = re.subn(r'^(__version__ = \")[^\"]+\"', r'\g<1>$NEW\"', src, flags=re.MULTILINE)
          if n != 1:
              sys.exit(f'Expected exactly 1 replacement in {path}, got {n}')
          open(path, 'w').write(new_src)
          "

          python -c "
          import re, sys
          path = 'README.md'
          src = open(path).read()
          new_src, n = re.subn(r'(# easyeda2kicad v)$OLD', r'\g<1>$NEW', src)
          if n != 1:
              sys.exit(f'Expected exactly 1 replacement in {path}, got {n}')
          open(path, 'w').write(new_src)
          "

          echo "old=$OLD" >> $GITHUB_OUTPUT
          echo "new=$NEW" >> $GITHUB_OUTPUT

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add easyeda2kicad/_version.py README.md
          git commit -m "chore: bump version ${{ steps.bump.outputs.old }} → ${{ steps.bump.outputs.new }}"
          git tag "v${{ steps.bump.outputs.new }}"
          git push --follow-tags
